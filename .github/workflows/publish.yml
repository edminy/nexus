name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 Git tag，例如 v0.0.1"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  macos_app:
    runs-on: macos-latest
    env:
      NEXUS_DESKTOP_GITHUB_CLIENT_ID: ${{ vars.NEXUS_DESKTOP_GITHUB_CLIENT_ID }}
      NEXUS_DESKTOP_NXS_RELEASE: "nxs-stable"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Tag
        run: |
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.2 --activate

      - name: Resolve pnpm Store
        id: macos-pnpm-store
        run: |
          echo "path=$(pnpm store path --silent)" >> "${GITHUB_OUTPUT}"

      - name: Cache pnpm Store
        uses: actions/cache@v5
        with:
          path: ${{ steps.macos-pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache SwiftPM Build
        uses: actions/cache@v5
        with:
          path: desktop/macos/.build
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('desktop/macos/Package.swift', 'desktop/macos/Sources/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Resolve nxs Runtime
        env:
          NEXUS_DESKTOP_NXS_DOWNLOAD_TOKEN: ${{ secrets.NEXUS_NXS_RUNTIME_RELEASE_TOKEN }}
        run: |
          cache_dir="${RUNNER_TEMP}/macos-runtime-cache"
          goarch="$(go env GOARCH)"
          nxs_path="${cache_dir}/nxs-${goarch}"
          mkdir -p "${cache_dir}"
          node scripts/desktop/fetch-nxs-runtime.js \
            --goos darwin \
            --goarch "${goarch}" \
            --output "${nxs_path}"
          echo "NEXUS_DESKTOP_NXS_RUNTIME_PATH=${nxs_path}" >> "${GITHUB_ENV}"

      - name: Import macOS Signing Certificate
        env:
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${MACOS_DEVELOPER_ID_CERTIFICATE_BASE64}" ]; then
            echo "Missing secret MACOS_DEVELOPER_ID_CERTIFICATE_BASE64" >&2
            exit 1
          fi
          if [ -z "${MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD}" ]; then
            echo "Missing secret MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" >&2
            exit 1
          fi

          cert_path="${RUNNER_TEMP}/developer-id-application.p12"
          keychain_path="${RUNNER_TEMP}/nexus-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "${MACOS_DEVELOPER_ID_CERTIFICATE_BASE64}" | base64 --decode > "${cert_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${cert_path}" \
            -k "${keychain_path}" \
            -P "${MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security default-keychain -s "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}"

          echo "MACOS_CODESIGN_KEYCHAIN_PATH=${keychain_path}" >> "${GITHUB_ENV}"

      - name: Build macOS DMG
        env:
          NEXUS_DESKTOP_APP_BUILD_DIR: ${{ runner.temp }}/macos-app
          NEXUS_DESKTOP_PACKAGE_OUTPUT_DIR: ${{ runner.temp }}/macos-artifacts
          NEXUS_DESKTOP_PACKAGE_FORMAT: dmg
          NEXUS_DESKTOP_VERSION: ${{ steps.tag.outputs.version }}
          NEXUS_DESKTOP_BUILD_NUMBER: ${{ github.run_number }}
          NEXUS_DESKTOP_SMOKE_ALLOW_FALLBACK: "1"
          NEXUS_DESKTOP_SMOKE_MAIN_TIMEOUT_SECONDS: "45"
          NEXUS_DESKTOP_SMOKE_LAUNCHER_TIMEOUT_SECONDS: "30"
          NEXUS_DESKTOP_NXS_DOWNLOAD_TOKEN: ${{ secrets.NEXUS_NXS_RUNTIME_RELEASE_TOKEN }}
          NEXUS_DESKTOP_CODESIGN_IDENTITY: ${{ vars.MACOS_DEVELOPER_ID_APPLICATION || secrets.MACOS_DEVELOPER_ID_APPLICATION }}
          NEXUS_DESKTOP_NOTARIZE: "1"
          NEXUS_DESKTOP_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          NEXUS_DESKTOP_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          NEXUS_DESKTOP_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          if [ -z "${NEXUS_DESKTOP_CODESIGN_IDENTITY}" ]; then
            echo "Missing MACOS_DEVELOPER_ID_APPLICATION repository variable or secret" >&2
            exit 1
          fi
          scripts/desktop/package-macos-app.sh

      - name: Upload macOS App Assets
        uses: actions/upload-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}-macos-app
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/macos-artifacts/Nexus-macos-*.dmg
            ${{ runner.temp }}/macos-artifacts/Nexus-macos-*.dmg.sha256
            ${{ runner.temp }}/macos-artifacts/Nexus-macos-*.dmg.metadata.json

      - name: Delete macOS Signing Keychain
        if: ${{ always() && env.MACOS_CODESIGN_KEYCHAIN_PATH != '' }}
        run: |
          security delete-keychain "${MACOS_CODESIGN_KEYCHAIN_PATH}" || true

  windows_app:
    runs-on: windows-latest
    env:
      NEXUS_DESKTOP_GITHUB_CLIENT_ID: ${{ vars.NEXUS_DESKTOP_GITHUB_CLIENT_ID }}
      NEXUS_DESKTOP_NXS_RELEASE: "nxs-stable"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
          }

          $version = $tag -replace "^v", ""
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Checkout Tag
        shell: pwsh
        run: |
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('desktop/windows/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.15.2 --activate

      - name: Resolve pnpm Store
        id: pnpm-store
        shell: pwsh
        run: |
          $storePath = (pnpm store path --silent).Trim()
          "path=$storePath" >> $env:GITHUB_OUTPUT

      - name: Cache pnpm Store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Inno Setup
        uses: actions/cache@v5
        with:
          path: C:\Program Files (x86)\Inno Setup 6
          key: ${{ runner.os }}-innosetup-6

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $iscc)) {
            choco install innosetup --no-progress -y
          }
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw "Inno Setup compiler was not installed: $iscc"
          }
          Split-Path -Parent $iscc | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "NEXUS_INNO_SETUP_COMPILER=$iscc" >> $env:GITHUB_ENV

      - name: Cache WebView2 Bootstrapper
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\windows-runtime-cache\MicrosoftEdgeWebView2Setup.exe
          key: ${{ runner.os }}-webview2-bootstrapper-evergreen

      - name: Resolve WebView2 Bootstrapper
        shell: pwsh
        run: |
          $cacheDir = Join-Path "${{ runner.temp }}" "windows-runtime-cache"
          $bootstrapperPath = Join-Path $cacheDir "MicrosoftEdgeWebView2Setup.exe"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          if (-not (Test-Path -LiteralPath $bootstrapperPath)) {
            Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile $bootstrapperPath
          }
          "NEXUS_WEBVIEW2_BOOTSTRAPPER_PATH=$bootstrapperPath" >> $env:GITHUB_ENV

      - name: Resolve nxs Runtime
        shell: pwsh
        env:
          NEXUS_DESKTOP_NXS_DOWNLOAD_TOKEN: ${{ secrets.NEXUS_NXS_RUNTIME_RELEASE_TOKEN }}
        run: |
          $cacheDir = Join-Path "${{ runner.temp }}" "windows-runtime-cache"
          $nxsPath = Join-Path $cacheDir "nxs.exe"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          node scripts/desktop/fetch-nxs-runtime.js --goos windows --goarch amd64 --output $nxsPath
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to download nxs runtime"
          }
          "NEXUS_DESKTOP_NXS_RUNTIME_PATH=$nxsPath" >> $env:GITHUB_ENV

      - name: Build Windows App Package
        shell: pwsh
        env:
          NEXUS_DESKTOP_APP_BUILD_DIR: ${{ runner.temp }}\windows-app\Nexus
          NEXUS_DESKTOP_PACKAGE_OUTPUT_DIR: ${{ runner.temp }}\windows-artifacts
          NEXUS_DESKTOP_VERSION: ${{ steps.tag.outputs.version }}
          NEXUS_DESKTOP_BUILD_NUMBER: ${{ github.run_number }}
          NEXUS_DESKTOP_SELF_CONTAINED: "true"
          NEXUS_DESKTOP_SMOKE_TIMEOUT_SECONDS: "75"
          NEXUS_WINDOWS_SIGNING_CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_PFX_BASE64 }}
          NEXUS_WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          NEXUS_WINDOWS_TIMESTAMP_SERVER: ${{ vars.WINDOWS_TIMESTAMP_SERVER || 'http://timestamp.digicert.com' }}
          NEXUS_DESKTOP_NXS_DOWNLOAD_TOKEN: ${{ secrets.NEXUS_NXS_RUNTIME_RELEASE_TOKEN }}
        run: |
          pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File scripts/desktop/package-windows-app.ps1

      - name: Upload Windows App Assets
        uses: actions/upload-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}-windows-app
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/windows-artifacts/Nexus-windows-*.metadata.json
            ${{ runner.temp }}/windows-artifacts/NexusSetup-*.exe
            ${{ runner.temp }}/windows-artifacts/NexusSetup-*.exe.sha256

  release:
    needs:
      - macos_app
      - windows_app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Tag
        run: |
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Extract Release Notes
        id: notes
        run: |
          VERSION="${{ steps.tag.outputs.version }}"

          awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\] - " {
              capture = 1
            }
            capture && $0 ~ "^## " && $0 !~ "^## \\[" version "\\] - " {
              exit
            }
            capture {
              print
            }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "未在 CHANGELOG.md 中找到版本 ${VERSION} 的发布说明"
            exit 1
          fi

      - name: Download macOS App Assets
        uses: actions/download-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}-macos-app
          path: ${{ runner.temp }}/artifacts

      - name: Download Windows App Assets
        uses: actions/download-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}-windows-app
          path: ${{ runner.temp }}/artifacts

      - name: Verify Bundled nxs Runtime Metadata
        run: |
          found_metadata=0
          for metadata in "${RUNNER_TEMP}/artifacts/"*.metadata.json; do
            if [ ! -f "${metadata}" ]; then
              continue
            fi
            found_metadata=1
            bundled="$(jq -r '.runtime.nxs.bundled // false' "${metadata}")"
            relative_path="$(jq -r '.runtime.nxs.relative_path // ""' "${metadata}")"
            if [ "${bundled}" != "true" ] || [ -z "${relative_path}" ]; then
              echo "Release metadata is missing bundled nxs runtime: ${metadata}" >&2
              cat "${metadata}" >&2
              exit 1
            fi
            case "$(basename "${metadata}")" in
              Nexus-macos-*.metadata.json)
                developer_id="$(jq -r '.signing.developer_id // false' "${metadata}")"
                notarized="$(jq -r '.signing.notarized // false' "${metadata}")"
                if [ "${developer_id}" != "true" ] || [ "${notarized}" != "true" ]; then
                  echo "macOS release metadata is not Developer ID signed and notarized: ${metadata}" >&2
                  cat "${metadata}" >&2
                  exit 1
                fi
                ;;
            esac
          done
          if [ "${found_metadata}" != "1" ]; then
            echo "No release metadata files were downloaded." >&2
            exit 1
          fi

      - name: Upload Release Assets
        uses: actions/upload-artifact@v7
        with:
          name: nexus-${{ steps.tag.outputs.tag }}
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg.sha256
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg.metadata.json
            ${{ runner.temp }}/artifacts/Nexus-windows-*.metadata.json
            ${{ runner.temp }}/artifacts/NexusSetup-*.exe
            ${{ runner.temp }}/artifacts/NexusSetup-*.exe.sha256

      - name: Remove Previous App Release Assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          release_json="$(mktemp)"
          release_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          status="$(
            curl -fsS -o "${release_json}" -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${release_api}" || true
          )"
          if [ "${status}" = "404" ]; then
            exit 0
          fi
          if [ "${status}" != "200" ]; then
            cat "${release_json}" >&2
            exit 1
          fi

          jq -r --arg version "${VERSION}" '
            .assets[]
            | select(
              (.name | test("^Nexus-macos-" + $version + "-[0-9]+\\.dmg(\\.sha256|\\.metadata\\.json)?$")) or
              (.name | test("^Nexus-windows-" + $version + "-[0-9]+\\.metadata\\.json$")) or
              (.name | test("^NexusSetup-" + $version + "-[0-9]+\\.exe(\\.sha256)?$"))
            )
            | [.id, .name]
            | @tsv
          ' "${release_json}" | while IFS="$(printf '\t')" read -r asset_id asset_name; do
            if [ -z "${asset_id}" ]; then
              continue
            fi
            echo "Deleting previous release asset: ${asset_name}"
            curl -fsS -X DELETE \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >/dev/null
          done

      - name: Update Existing Release Notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          release_json="$(mktemp)"
          release_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          status="$(
            curl -fsS -o "${release_json}" -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${release_api}" || true
          )"
          if [ "${status}" = "404" ]; then
            exit 0
          fi
          if [ "${status}" != "200" ]; then
            cat "${release_json}" >&2
            exit 1
          fi

          release_id="$(jq -r '.id' "${release_json}")"
          if [ -z "${release_id}" ] || [ "${release_id}" = "null" ]; then
            echo "Release id is missing for ${TAG}" >&2
            cat "${release_json}" >&2
            exit 1
          fi

          payload="$(jq -n --rawfile body release_notes.md --arg name "${TAG}" '{name: $name, body: $body}')"
          curl -fsS -X PATCH \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}" >/dev/null

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release_notes.md
          generate_release_notes: false
          files: |
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg.sha256
            ${{ runner.temp }}/artifacts/Nexus-macos-*.dmg.metadata.json
            ${{ runner.temp }}/artifacts/Nexus-windows-*.metadata.json
            ${{ runner.temp }}/artifacts/NexusSetup-*.exe
            ${{ runner.temp }}/artifacts/NexusSetup-*.exe.sha256
